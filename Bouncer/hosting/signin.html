<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Bouncer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #faf6f0;
    }
    .container {
      text-align: center;
      padding: 48px 44px;
      max-width: 400px;
      width: 90%;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #2c1810;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 15px;
      color: #8b7355;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-google {
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      margin-bottom: 12px;
    }
    .btn-apple {
      background: #000;
      color: #fff;
    }
    .btn svg { flex-shrink: 0; }
    .hint {
      margin-top: 28px;
      font-size: 12px;
      color: #c4b49a;
      line-height: 1.5;
    }
    .status {
      margin-top: 16px;
      font-size: 14px;
      color: #8b7355;
    }
    .status.error { color: #ff3b30; }
    .status.success { color: #34c759; }
    /* Hide FirebaseUI default styles */
    #firebaseui-auth-container { display: none; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container">
    <img class="logo" src="icon128.png" alt="Bouncer">
    <h1>Bouncer</h1>
    <p class="sub">Sign in to start filtering your feed on X</p>

    <button class="btn btn-google" id="googleBtn">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button class="btn btn-apple" id="appleBtn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
      </svg>
      Continue with Apple
    </button>

    <p class="status" id="status"></p>
    <p class="hint">Sign-in helps us prevent abuse and keep Bouncer free</p>
  </div>

  <script>
    var params = new URLSearchParams(window.location.hash.substring(1));
    var config = {
      apiKey: params.get('apiKey'),
      authDomain: params.get('authDomain'),
      projectId: params.get('projectId'),
    };
    var extensionId = params.get('extensionId');
    var statusEl = document.getElementById('status');
    console.log('[SignIn] Extension ID:', extensionId);

    if (!config.apiKey) {
      statusEl.textContent = 'Error: missing configuration';
      statusEl.className = 'status error';
    } else {
      firebase.initializeApp(config);
      var auth = firebase.auth();

      // If the bridge content script isn't injected (user hasn't granted
      // Safari permission to this site), the credential posted to the bridge
      // has no listener. We wait ACK_TIMEOUT_MS for the bridge to ack
      // delivery and show a permission-needed panel on timeout.
      var ACK_TIMEOUT_MS = 5000;

      function showPermissionNeeded() {
        var container = document.querySelector('.container');
        container.innerHTML =
          '<img class="logo" src="icon128.png" alt="Bouncer">' +
          '<h1>Permission needed</h1>' +
          '<p class="sub" style="margin-bottom:24px;">Bouncer doesn\'t have access to <strong>' + window.location.hostname + '</strong> yet, so signing in won\'t work.</p>' +
          '<p class="sub" style="margin-bottom:24px;font-size:14px;text-align:left;">Open <strong>Safari → Settings → Extensions → Bouncer → Websites</strong>, set <strong>' + window.location.hostname + '</strong> to <strong>Allow</strong>, then click Retry below.</p>' +
          '<button class="btn btn-apple" id="retryBtn">Retry</button>';
        document.getElementById('retryBtn').addEventListener('click', function() {
          window.location.reload();
        });
      }

      function showSignedIn() {
        var container = document.querySelector('.container');
        container.innerHTML =
          '<img class="logo" src="icon128.png" alt="Bouncer">' +
          '<h1>You\'re all set!</h1>' +
          '<p class="sub">You can close this tab and return to X to begin filtering.</p>';
      }

      function signInWith(provider) {
        statusEl.className = 'status';
        statusEl.textContent = 'Opening sign-in...';

        auth.signInWithPopup(provider).then(function(result) {
          statusEl.textContent = 'Activating Bouncer...';
          var user = result.user;
          var credential = result.credential;

          return user.getIdToken().then(function(firebaseToken) {
            var data = {
              type: 'bouncer-signin-result',
              firebaseToken: firebaseToken,
              providerId: credential ? credential.providerId : '',
              idToken: credential ? (credential.idToken || '') : '',
              accessToken: credential ? (credential.accessToken || '') : '',
              rawNonce: '',
              uid: user.uid,
            };

            // Listen for ack before posting so we don't race
            var ackReceived = false;
            function onAck(e) {
              if (e.source !== window) return;
              if (!e.data || e.data.type !== 'bouncer-bridge-ack') return;
              ackReceived = true;
              clearTimeout(timeoutId);
              window.removeEventListener('message', onAck);
              if (e.data.success) {
                showSignedIn();
              } else {
                statusEl.className = 'status error';
                statusEl.textContent = 'Extension error: ' + (e.data.error || 'Unknown');
              }
            }
            window.addEventListener('message', onAck);

            var timeoutId = setTimeout(function() {
              if (ackReceived) return;
              window.removeEventListener('message', onAck);
              console.warn('[SignIn] No ack from bridge — likely missing host permission');
              showPermissionNeeded();
            }, ACK_TIMEOUT_MS);

            console.log('[SignIn] Posting credential to bridge content script');
            window.postMessage(data, '*');
            statusEl.textContent = 'Finishing up...';
          });
        }).catch(function(err) {
          // User cancelled the popup or started a second sign-in before the first finished.
          // These aren't real failures — stay silent so a successful retry isn't masked.
          if (err && (err.code === 'auth/cancelled-popup-request' || err.code === 'auth/popup-closed-by-user')) {
            console.log('[SignIn] Popup cancelled:', err.code);
            return;
          }
          console.error('[SignIn] Error:', err);
          statusEl.className = 'status error';
          statusEl.textContent = 'Sign-in failed: ' + (err.message || err.code || 'Unknown error');
        });
      }

      document.getElementById('googleBtn').addEventListener('click', function() {
        var googleProvider = new firebase.auth.GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });
        signInWith(googleProvider);
      });

      document.getElementById('appleBtn').addEventListener('click', function() {
        var provider = new firebase.auth.OAuthProvider('apple.com');
        provider.addScope('email');
        signInWith(provider);
      });
    }
  </script>
</body>
</html>
