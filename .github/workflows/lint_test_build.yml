name: Lint, Test, and Build

permissions:
  contents: read

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - "Bouncer/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Bouncer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Bouncer/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Bouncer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Bouncer/package-lock.json
      - run: npm ci
      - run: node build.js
